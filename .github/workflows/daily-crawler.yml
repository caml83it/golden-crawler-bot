name: Gold Price Crawler

on:
  schedule:
    - cron: '0 2 * * *' # 9h sáng VN
  workflow_dispatch:

jobs:
  crawler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm run install

      - name: Run crawler
        run: node crawler.js